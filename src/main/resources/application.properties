# MongoDB Configuration
quarkus.mongodb.connection-string=mongodb://n8n:n8n@10.7.12.247:27017/?authSource=admin
quarkus.mongodb.database=hermes-dev
# Kafka Configuration
mp.messaging.outgoing.hermes-domain-events.connector=smallrye-kafka
mp.messaging.outgoing.hermes-domain-events.topic=hermes.notification.created
mp.messaging.incoming.hermes-notification-created.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.outgoing.hermes-domain-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.hermes-notification-created.connector=smallrye-kafka
mp.messaging.incoming.hermes-notification-created.topic=hermes.notification.created
mp.messaging.incoming.hermes-notification-created.auto.offset.reset=earliest
mp.messaging.incoming.hermes-notification-created.failure-strategy=dead-letter-queue
# Template Engine Configuration
hermes.template.cache-ttl-seconds=300
hermes.template.placeholder-regex=\\{\\{(\\w[\\w.]*)\\}\\}
# Delivery consumer (separate consumer group from projector)
mp.messaging.incoming.hermes-notification-delivery.connector=smallrye-kafka
mp.messaging.incoming.hermes-notification-delivery.topic=hermes.notification.created
mp.messaging.incoming.hermes-notification-delivery.group.id=hermes-delivery
mp.messaging.incoming.hermes-notification-delivery.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.hermes-notification-delivery.auto.offset.reset=earliest
mp.messaging.incoming.hermes-notification-delivery.failure-strategy=dead-letter-queue
# Sent events outgoing
mp.messaging.outgoing.hermes-notification-sent.connector=smallrye-kafka
mp.messaging.outgoing.hermes-notification-sent.topic=hermes.notification.sent
mp.messaging.outgoing.hermes-notification-sent.value.serializer=org.apache.kafka.common.serialization.StringSerializer
# Failed events outgoing
mp.messaging.outgoing.hermes-notification-failed.connector=smallrye-kafka
mp.messaging.outgoing.hermes-notification-failed.topic=hermes.notification.delivery-failed
mp.messaging.outgoing.hermes-notification-failed.value.serializer=org.apache.kafka.common.serialization.StringSerializer
# Projector consumers
mp.messaging.incoming.hermes-notification-sent-projector.connector=smallrye-kafka
mp.messaging.incoming.hermes-notification-sent-projector.topic=hermes.notification.sent
mp.messaging.incoming.hermes-notification-sent-projector.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.hermes-notification-sent-projector.auto.offset.reset=earliest
mp.messaging.incoming.hermes-notification-sent-projector.failure-strategy=dead-letter-queue
mp.messaging.incoming.hermes-notification-failed-projector.connector=smallrye-kafka
mp.messaging.incoming.hermes-notification-failed-projector.topic=hermes.notification.delivery-failed
mp.messaging.incoming.hermes-notification-failed-projector.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.hermes-notification-failed-projector.auto.offset.reset=earliest
mp.messaging.incoming.hermes-notification-failed-projector.failure-strategy=dead-letter-queue
# Delivery tuning
hermes.delivery.max-retries=3
hermes.delivery.initial-backoff-ms=1000
hermes.delivery.backoff-multiplier=2.0
hermes.delivery.provider-timeout-ms=10000
# OpenAPI/Swagger Configuration
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=Hermes Notification API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API de notifica��es do Hermes
mp.openapi.extensions.smallrye.info.contact.email=contato@olympus.com.br
mp.openapi.extensions.smallrye.info.contact.name=Olympus Team
mp.openapi.extensions.smallrye.info.license.name=Apache 2.0
mp.openapi.extensions.smallrye.info.license.url=https://www.apache.org/licenses/LICENSE-2.0.html
# Email Provider Configuration
hermes.provider.email.smtp-host=${EMAIL_SMTP_HOST:smtp.example.com}
hermes.provider.email.smtp-port=${EMAIL_SMTP_PORT:587}
hermes.provider.email.smtp-username=${EMAIL_SMTP_USERNAME:}
hermes.provider.email.smtp-password=${EMAIL_SMTP_PASSWORD:}
hermes.provider.email.smtp-starttls=${EMAIL_SMTP_STARTTLS:true}
hermes.provider.email.timeout-ms=${EMAIL_TIMEOUT_MS:10000}
# Push Provider Configuration
hermes.provider.push.firebase-credentials-path=${FIREBASE_CREDENTIALS_PATH:}
